<!DOCTYPE html>
<html>
<head>
  <title>Ọlámidé & Olúwaseunfúnmi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- elegant font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #fffdf7, #f7f0e6);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      color:#3a2e2a;
    }

    .card{
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding:40px 30px;
      max-width:520px;
      width:90%;
      text-align:center;
      border-radius:18px;
      box-shadow:0 20px 60px rgba(0,0,0,0.08);
      border:1px solid rgba(212,175,55,0.25);
    }

    .top{
      font-size:12px;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#8b6b3d;
    }

    h1{
      font-family:'Playfair Display', serif;
      font-size:2.4rem;
      margin:15px 0 5px;
    }

    .introduce{
      font-style:italic;
      color:#7a6a5a;
      margin-bottom:20px;
    }

    .text{
      font-size:15px;
      line-height:1.6;
      margin-bottom:20px;
    }

    .date{
      font-size:20px;
      font-weight:500;
      margin:15px 0;
      color:#2f241f;
    }

    .location{
      font-size:14px;
      color:#6b5b4f;
      line-height:1.5;
    }

    .time{
      margin-top:10px;
      font-weight:600;
      color:#8b6b3d;
    }

    .music-btn{
      margin-top:25px;
      padding:10px 18px;
      border-radius:30px;
      border:1px solid #c9a86a;
      background:transparent;
      color:#8b6b3d;
      cursor:pointer;
      font-size:14px;
    }

    .music-btn:hover{
      background:#c9a86a;
      color:white;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="top">Together with their families</div>

    <h1>Ọlámidé & Olúwaseunfúnmi</h1>

    <div class="introduce">Ọlámidé introduces Olúwaseunfúnmi</div>

    <div class="text">
      Request the honour of your presence<br>
      at their introduction ceremony
    </div>

    <div class="date">June 27, 2026</div>

    <div class="time">12:00 PM</div>

    <div class="location">
      Shórèmékún Street<br>
      Abuja, Nigeria
    </div>

    <button class="music-btn" onclick="startMusic()">
      ▶️ Play Music
    </button>

    <audio id="bgMusic" loop>
      <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1b6c0b2.mp3?filename=romantic-piano-ambient-110397.mp3">
    </audio>
  </div>

<script>
let started = false;
const music = document.getElementById("bgMusic");

function startMusic(){
  if(started) return;

  music.volume = 0;
  music.play();

  let v = 0;
  const fade = setInterval(() => {
    if(v < 1){
      v += 0.05;
      music.volume = v;
    } else {
      clearInterval(fade);
    }
  }, 120);

  started = true;
}
</script>

</body>
</html>
