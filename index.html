<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ọlámidé & Olúwaseunfúnmi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
background:#050505;
font-family:'Cormorant Garamond',serif;
overflow:hidden;
height:100vh;
}
/* ACCESS SCREEN */
#landing{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#050505;
z-index:100;
text-align:center;
padding:30px;
}
h1{
color:#d4af37;
font-size:3rem;
line-height:1.2;
font-weight:600;
}
.subtitle{
margin-top:15px;
color:#f1df9f;
letter-spacing:4px;
font-size:12px;
text-transform:uppercase;
}
button{
margin-top:40px;
padding:16px 38px;
background:transparent;
border:1px solid #d4af37;
border-radius:50px;
color:#d4af37;
font-size:13px;
letter-spacing:3px;
cursor:pointer;
}
/* INVITATION */
#invitation{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
opacity:0;
visibility:hidden;
transition:2s ease;
}
#invitation img{
max-width:95%;
max-height:95vh;
object-fit:contain;
box-shadow:0 0 80px rgba(212,175,55,.15);
border-radius:12px;
}
.show{
opacity:1 !important;
visibility:visible !important;
}
.hide{
opacity:0;
visibility:hidden;
}
</style>
</head>
<body>
<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>
<div id="landing">
<h1>
Ọlámidé<br>
introduces<br>
Olúwaseunfúnmi
</h1>
<div class="subtitle">
Introduction Ceremony
</div>
<button onclick="openInvitation()">
ACCESS INVITATION
</button>
</div>
<div id="invitation">
<img src="invitation.jpg" alt="Invitation">
</div>
<script>
function openInvitation(){
document.getElementById("music").play();
document.getElementById("landing").classList.add("hide");
setTimeout(()=>{
document.getElementById("invitation").classList.add("show");
},800);
}
</script>
</body>
</html>
